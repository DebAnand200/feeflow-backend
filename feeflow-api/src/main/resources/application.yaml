spring:
  application:
    name: feeflow-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: yourpassword
  flyway:
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate # Best practice when using Flyway is 'validate' instead of 'update'
    show-sql: true